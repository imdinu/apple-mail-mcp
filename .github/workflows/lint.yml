name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt into Node 24 ahead of the June 2026 forced cutover. Quiets the
# deprecation warning that surfaces on every Actions run today and keeps
# us compatible after Node 20 is removed from runners (Sept 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --group dev
      - run: uv run ruff check src/
      - run: uv run ruff format --check src/

  # macOS runner: the project is macOS-only, and most of the suite runs
  # without Mail.app present (parsing, search, config, builders).
  test:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run pytest -q
